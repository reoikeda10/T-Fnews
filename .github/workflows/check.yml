name: Record-Checker-V2

on:
  schedule:
    - cron: '*/30 * * * *'  # 30分おきに実行
  workflow_dispatch:        # 手動実行も可能
jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限
    steps:
      - name: リポジトリを読み込む
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 最新の変更を正しく取り込むために必要

      - name: Python3.12をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          # 新しい google-genai ライブラリをインストール
          pip install --upgrade google-genai twikit

      - name: プログラムを実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_COOKIES: ${{ secrets.X_COOKIES }} # これを追加
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
        run: python app.py

      - name: 結果を保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # data.jsonに変更があるか確認
          git add data.json
          if ! git diff --staged --quiet; then
            git commit -m "Update records [skip ci]"
            # 他の更新（ブラウザ編集など）との競合を防ぐ
            git pull --rebase origin main
            git push origin main
          else
            echo "No new records to update."
          fi
