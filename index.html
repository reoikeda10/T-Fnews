<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陸上競技 速報ニュース</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #e63946; }
        
        /* 検索とフィルター */
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-bar { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .categories { display: flex; flex-wrap: wrap; gap: 5px; }
        .cat-btn { padding: 8px 12px; border: none; background: #ddd; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .cat-btn.active { background: #e63946; color: white; font-weight: bold; }

        /* カードデザイン */
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-2px); }
        .event { font-size: 0.9em; color: #666; font-weight: bold; margin-bottom: 5px; }
        .name { font-size: 1.4em; font-weight: bold; color: #1d3557; margin: 5px 0; }
        .time { font-size: 1.8em; font-weight: 900; color: #e63946; margin: 5px 0; }
        .meta { display: flex; justify-content: space-between; font-size: 0.85em; color: #888; margin-top: 10px; }
        
        /* MAX記録の特大デザイン */
        .max-record { background: linear-gradient(135deg, #fff9c4, #fff); border: 2px solid #fbc02d; position: relative; }
        .max-record::before { content: '👑 激アツ記録！'; position: absolute; top: -12px; left: 15px; background: #fbc02d; color: #333; padding: 2px 10px; font-size: 0.8em; font-weight: bold; border-radius: 10px; }
        .max-record .time { font-size: 2.2em; color: #d32f2f; }

        .section-title { font-size: 1.2em; border-bottom: 2px solid #ccc; padding-bottom: 5px; margin: 30px 0 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏃‍♂️ 陸上 速報ニュース</h1>

        <div class="controls">
            <input type="text" id="searchInput" class="search-bar" placeholder="選手名、大会名、種目などで検索...">
            <div class="categories" id="categoryButtons">
                <button class="cat-btn active" data-cat="すべて">すべて</button>
                <button class="cat-btn" data-cat="短距離">短距離</button>
                <button class="cat-btn" data-cat="ハードル">ハードル</button>
                <button class="cat-btn" data-cat="中距離">中距離</button>
                <button class="cat-btn" data-cat="長距離">長距離</button>
                <button class="cat-btn" data-cat="跳躍">跳躍</button>
                <button class="cat-btn" data-cat="投擲">投擲</button>
                <button class="cat-btn" data-cat="ロード">ロード</button>
            </div>
        </div>

        <div id="maxRecordsContainer"></div>
        <h2 class="section-title">タイムライン</h2>
        <div id="newsContainer"></div>
    </div>

    <script>
        let allData = [];
        let currentCategory = "すべて";

        // 日付文字列をJSのDateオブジェクトに変換（古いフォーマットにも対応）
        function parseDate(dateStr) {
            let parts = dateStr.split(' ');
            let dateParts = parts[0].split('/');
            let timeParts = parts[1] ? parts[1].split(':') : [0,0];
            let year = new Date().getFullYear();
            let month, day;

            if (dateParts.length === 2) {
                month = parseInt(dateParts[0]) - 1;
                day = parseInt(dateParts[1]);
            } else {
                year = parseInt(dateParts[0]);
                month = parseInt(dateParts[1]) - 1;
                day = parseInt(dateParts[2]);
            }
            return new Date(year, month, day, timeParts[0], timeParts[1]);
        }

        // データを取得
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                allData = data;
                renderData();
            });

        // 検索とカテゴリのイベントリスナー
        document.getElementById('searchInput').addEventListener('input', renderData);
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-cat');
                renderData();
            });
        });

        function renderData() {
            const container = document.getElementById('newsContainer');
            const maxContainer = document.getElementById('maxRecordsContainer');
            const searchWord = document.getElementById('searchInput').value.toLowerCase();
            const now = new Date();
            const threeDaysMs = 3 * 24 * 60 * 60 * 1000; // 3日間

            container.innerHTML = '';
            maxContainer.innerHTML = '';

            let maxCount = 0;

            allData.forEach(item => {
                // 検索フィルタ
                const textForSearch = `${item.event} ${item.name} ${item.time} ${item.comment || ''}`.toLowerCase();
                if (searchWord && !textForSearch.includes(searchWord)) return;

                // カテゴリフィルタ
                if (currentCategory !== "すべて" && item.category !== currentCategory) return;

                // 3日以内か判定
                const itemDate = parseDate(item.date);
                const isRecent = (now - itemDate) <= threeDaysMs;

                // カードのHTMLを作成
                let scoreStars = '★'.repeat(item.score || 1) + '☆'.repeat(5 - (item.score || 1));
                let cardClass = "card";
                
                // スコア5かつ3日以内のものはMAXデザインにする
                let isMax = (item.score === 10 && isRecent);
                if (isMax) cardClass += " max-record";

                const cardHTML = `
                    <div class="${cardClass}">
                        <div class="event">${item.category ? `[${item.category}] ` : ''}${item.event}</div>
                        <div class="name">${item.name}</div>
                        <div class="time">${item.time}</div>
                        <div style="font-size: 0.9em;">${item.comment || ''}</div>
                        <div class="meta">
                            <span>凄さ: <span style="color:#fbc02d;">${scoreStars}</span></span>
                            <span>${item.date}</span>
                        </div>
                    </div>
                `;

                // MAXは上に、通常は下に振り分け
                if (isMax) {
                    maxContainer.innerHTML += cardHTML;
                    maxCount++;
                } else {
                    container.innerHTML += cardHTML;
                }
            });

            // MAX記録がない場合は余白を詰める
            maxContainer.style.display = maxCount > 0 ? "block" : "none";
        }
    </script>
</body>
</html>
